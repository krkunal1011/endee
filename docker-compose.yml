services:
  endee-oss:
    image: endee-oss:latest
    build:
      context: .
      dockerfile: infra/Dockerfile
      args:
        BUILD_ARCH: avx2   
    container_name: endee-oss
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
# ----------------------------------------------------
# Logging Configuration Block
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"
# ----------------------------------------------------
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: 
    volumes:
      - endee-data:/data
    restart: unless-stopped

volumes:
  endee-data: